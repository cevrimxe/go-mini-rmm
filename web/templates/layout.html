<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Mini RMM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        :root {
            /* Premium Dark Theme Palette (Zinc/Slate inspired) */
            --bg-color: #09090b;          /* Very dark background */
            --surface: #18181b;           /* Card/Surface background */
            --surface-hover: #27272a;     /* Surface hover state */
            --surface-border: #27272a;    /* Subtle borders */
            
            --accent: #6366f1;            /* Primary Indigo */
            --accent-hover: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.4);
            
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.3);
            --red: #ef4444;
            --red-glow: rgba(239, 68, 68, 0.3);
            --yellow: #f59e0b;
            --yellow-glow: rgba(245, 158, 11, 0.3);
            --info: #3b82f6;
            
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
            
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 14px;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% 0%, rgba(30, 27, 75, 0.15) 0%, transparent 70%);
            min-height: 100vh;
        }

        /* ---- NAV ---- */
        .top-nav {
            background: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
            color: var(--text-main);
            text-decoration: none;
        }
        .brand span {
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand svg { 
            color: var(--accent); 
            filter: drop-shadow(0 0 8px var(--accent-glow));
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links li { margin: 0; padding: 0; display: flex; align-items: center; }
        .nav-links a {
            padding: 0.45rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }
        .nav-right {
            display: flex;
            align-items: center;
        }
        .btn-logout {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--red);
        }

        /* ---- BADGES ---- */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            border: 1px solid transparent;
        }
        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        .badge-online { 
            background: rgba(16, 185, 129, 0.1); 
            color: var(--green); 
            border-color: rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 10px var(--green-glow);
        }
        .badge-offline { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--red); 
            border-color: rgba(239, 68, 68, 0.2);
        }
        .badge-warning { 
            background: rgba(245, 158, 11, 0.1); 
            color: var(--yellow); 
            border-color: rgba(245, 158, 11, 0.2);
        }
        .badge-info { 
            background: rgba(59, 130, 246, 0.1); 
            color: var(--info); 
            border-color: rgba(59, 130, 246, 0.2);
        }
        .badge-online::before { 
            box-shadow: 0 0 8px var(--green); 
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; 
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ---- METRIC BARS ---- */
        .metric-bar {
            height: 6px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        .metric-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }
        .metric-bar-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        
        .fill-green { background: linear-gradient(90deg, #10b981, #34d399); box-shadow: 0 0 8px var(--green-glow); }
        .fill-yellow { background: linear-gradient(90deg, #f59e0b, #fbbf24); box-shadow: 0 0 8px var(--yellow-glow); }
        .fill-red { background: linear-gradient(90deg, #ef4444, #f87171); box-shadow: 0 0 8px var(--red-glow); }

        /* ---- STAT CARDS ---- */
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            padding: 1.4rem 1.5rem;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
            background: var(--surface-hover);
        }
        .stat-card:hover::before { opacity: 1; }
        
        .stat-card h3 {
            margin: 0 0 0.5rem 0;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            font-weight: 600;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        /* ---- TABLE ---- */
        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            background: var(--surface);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        table { 
            font-size: 0.85rem; 
            border-collapse: separate; 
            border-spacing: 0; 
            width: 100%; 
            margin: 0;
        }
        thead th {
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(4px);
            position: sticky;
            top: 0;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            font-weight: 600;
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--surface-border);
            text-align: left;
        }
        tbody tr { 
            transition: background 0.2s ease; 
        }
        tbody tr:hover { 
            background: rgba(255, 255, 255, 0.02); 
        }
        td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        
        td a { 
            color: var(--text-main); 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.2s;
        }
        td a:hover { 
            color: var(--accent-hover); 
        }
        td code { 
            font-size: 0.78rem; 
            background: rgba(255,255,255,0.05); 
            padding: 0.15rem 0.4rem; 
            border-radius: 4px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            color: var(--text-muted);
        }

        /* ---- TERMINAL ---- */
        .terminal-output {
            background: #000000;
            color: #a6e3a1;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            white-space: pre-wrap;
            min-height: 120px;
            max-height: 500px;
            overflow-y: auto;
            font-size: 0.82rem;
            line-height: 1.6;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            position: relative;
        }
        .terminal-output::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 30px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }
        .terminal-output::-webkit-scrollbar { width: 6px; }
        .terminal-output::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 6px; }

        /* ---- FORM ---- */
        input, select, textarea {
            border-radius: 8px !important;
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid var(--surface-border) !important;
            font-size: 0.85rem !important;
            padding: 0.6rem 1rem !important;
            color: var(--text-main) !important;
            transition: all 0.2s ease !important;
            font-family: 'Inter', sans-serif !important;
        }
        input:focus, select:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2) !important;
            outline: none !important;
        }
        input::placeholder { color: var(--text-dim) !important; }

        /* ---- BUTTONS ---- */
        button, [type="submit"], .btn {
            border-radius: 8px !important;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.6rem 1.2rem;
            transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) !important;
            cursor: pointer;
            border: 1px solid transparent !important;
            font-family: 'Inter', sans-serif !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-accent {
            background: linear-gradient(135deg, var(--accent), #4f46e5) !important;
            color: #fff !important;
            box-shadow: 0 4px 12px var(--accent-glow) !important;
        }
        .btn-accent:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.6) !important;
            filter: brightness(1.1);
        }
        .btn-accent:active {
            transform: translateY(0);
        }
        .btn-sm {
            padding: 0.4rem 0.8rem !important;
            font-size: 0.75rem !important;
        }
        .btn-outline {
            background: transparent !important;
            border-color: rgba(255,255,255,0.1) !important;
            color: var(--text-main) !important;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05) !important;
            border-color: rgba(255,255,255,0.2) !important;
        }

        /* ---- SECTION HEADER ---- */
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin: 2rem 0 1rem 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }
        .section-header svg { color: var(--accent); width: 18px; height: 18px; }

        /* ---- MISC ---- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        main { animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        footer { text-align: center; padding: 2rem 0; color: var(--text-dim); font-size: 0.75rem; font-weight: 500; }
        .text-muted { color: var(--text-muted); }
        .text-dim { color: var(--text-dim); }
        .text-sm { font-size: 0.78rem; }
        
        /* Modal Override */
        dialog article {
            background: var(--surface) !important;
            border: 1px solid var(--surface-border) !important;
            border-radius: 16px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
        }
        dialog article header {
            background: rgba(255,255,255,0.02) !important;
            border-bottom: 1px solid var(--surface-border) !important;
        }
        dialog article footer {
            background: rgba(255,255,255,0.02) !important;
            border-top: 1px solid var(--surface-border) !important;
        }
    </style>
</head>
<body>
    <header class="top-nav">
        <div class="nav-left">
            <a href="/" class="brand">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span>Mini RMM</span>
            </a>
            <ul class="nav-links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/ui/alerts">Alerts</a></li>
                <li><a href="/ui/audit-logs">Audit Logs</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <form method="POST" action="/logout" style="margin:0">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </div>
    </header>
    <main class="container" style="margin-top:1.5rem; max-width:1800px; padding:0 1.5rem;">
        {{template "content" .}}
    </main>
    <footer>Go Mini RMM</footer>
</body>
</html>
